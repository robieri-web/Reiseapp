/* ── AUTH SCREEN ── */

}

.auth-card{
  width:100%;max-width:360px;

  padding:13px 14px;outline:none;margin-bottom:14px;

}
.auth-input:focus{border-color:var(--accent);}

.btn-gold{

    radial-gradient(1px 1px at 35% 85%,rgba(255,255,255,.4) 0%,transparent 100%),

/* ── GLOBE PAGE ── */

.modal-overlay{

  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);

}

.field-label{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;}
.field-input{
  width:100%;background:var(--s2);border:1.5px solid var(--border);border-radius:12px;
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;
  padding:13px 14px;outline:none;margin-bottom:16px;

.photo-upload-area{

.modal-actions{display:flex;gap:10px;padding:0 20px 10px;}
.btn-primary-gold{
  flex:1;padding:15px;border:none;border-radius:14px;
  background:linear-gradient(135deg,#c8963e,#e8b45a);
  color:#050d1a;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;
  cursor:pointer;transition:opacity .15s,transform .1s;
}

/* ── TOAST ── */
#toast{
  position:fixed;top:calc(var(--top-h) + env(safe-area-inset-top,0px) + 12px);

/* ── LOADING ── */
#loading{

/* ── DESKTOP ── */

  .page,.topbar,.bottom-nav{max-width:480px;left:50%;transform:translateX(-50%);}

<script>
// ── CONFIG ─────────────────────────────────────────────
const SUPABASE_URL='https://ronspwotximtvolvtewo.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJvbnNwd290eGltdHZvbHZ0ZXdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMDc1MjEsImV4cCI6MjA5NDY4MzUyMX0.rZiMqUqWuDkboUUDVYx9CgXpKgiI5uqcOu4VLy2eW9U';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

// ── STATE ──────────────────────────────────────────────
let destinations=[];
let currentUser=null;
let globe=null;
let photoFile=null;
let editingId=null;

// ── INIT ───────────────────────────────────────────────
async function init(){
  const {data:{session}}=await sb.auth.getSession();
  if(session){
    currentUser=session.user;
    showApp();
  } else {
    showAuth();
  }
  sb.auth.onAuthStateChange((_,session)=>{
    if(session&&!currentUser){currentUser=session.user;showApp();}
    else if(!session&&currentUser){currentUser=null;location.reload();}
  });
}

// ── AUTH ───────────────────────────────────────────────
function showAuth(){
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('auth-screen').classList.remove('hidden');
}
function showApp(){
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('user-email').textContent=currentUser.email;
  loadDestinations();
  setTimeout(initGlobe,100);
}
function showAuthTab(tab){
  document.getElementById('auth-login').style.display=tab==='login'?'block':'none';
  document.getElementById('auth-register').style.display=tab==='register'?'block':'none';
  document.getElementById('tab-login').classList.toggle('active',tab==='login');
  document.getElementById('tab-register').classList.toggle('active',tab==='register');
  document.getElementById('auth-error').textContent='';
}
async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pw=document.getElementById('login-pw').value;
  const {error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error)document.getElementById('auth-error').textContent=error.message;
}
async function doRegister(){
  const email=document.getElementById('reg-email').value.trim();
  const pw=document.getElementById('reg-pw').value;
  const {error}=await sb.auth.signUp({email,password:pw});
  if(error)document.getElementById('auth-error').textContent=error.message;
  else document.getElementById('auth-error').textContent='✅ Bestätigungsmail gesendet!';
}
async function doLogout(){
  await sb.auth.signOut();
}

// ── DATA ───────────────────────────────────────────────
async function loadDestinations(){
  const {data,error}=await sb.from('reiseziele').select('*').order('created_at',{ascending:false});
  if(error){showToast('Fehler beim Laden');return;}
  destinations=data||[];
  updateCount();
  renderList();
  if(globe)updateGlobePins();
}

function updateCount(){
  document.getElementById('dest-count').textContent=destinations.length+' Ziel'+(destinations.length!==1?'e':'');
}

// ── GEOCODING ──────────────────────────────────────────
async function geocode(ort,land){
  const q=encodeURIComponent(ort+', '+land);
  const url=`https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1`;
  try{
    const r=await fetch(url,{headers:{'Accept-Language':'de'}});
    const data=await r.json();
    if(data&&data[0])return{lat:parseFloat(data[0].lat),lng:parseFloat(data[0].lon)};
  }catch(e){}
  return null;
}

// ── SAVE ───────────────────────────────────────────────
async function saveDestination(){
  const land=document.getElementById('field-land').value.trim();
  const ort=document.getElementById('field-ort').value.trim();
  const datum=document.getElementById('field-datum').value||null;
  const notizen=document.getElementById('field-notizen').value.trim()||null;
  if(!land||!ort){showToast('Land und Ort sind Pflichtfelder');return;}

  document.getElementById('geocode-status').textContent='📍 Koordinaten werden gesucht…';

  // Geocode
  const coords=await geocode(ort,land);
  if(!coords){document.getElementById('geocode-status').textContent='⚠️ Ort nicht gefunden — Pin wird auf 0,0 gesetzt';
  } else {document.getElementById('geocode-status').textContent='';}

  const lat=coords?coords.lat:0;
  const lng=coords?coords.lng:0;

  // Upload Foto
  let foto_url=null;
  const existingUrl=document.getElementById('photo-preview').src;
  if(photoFile){
    const ext=photoFile.name.split('.').pop();
    const path=`${currentUser.id}/${Date.now()}.${ext}`;
    const {error:upErr}=await sb.storage.from('fotos').upload(path,photoFile,{upsert:true});
    if(!upErr){
      const {data:urlData}=sb.storage.from('fotos').getPublicUrl(path);
      foto_url=urlData.publicUrl;
    }
  } else if(editingId&&existingUrl&&existingUrl.startsWith('http')){
    foto_url=existingUrl;
  }

  const record={land,ort,lat,lng,datum,notizen,foto_url,user_id:currentUser.id};

  let error;
  if(editingId){
    ({error}=await sb.from('reiseziele').update(record).eq('id',editingId));
  } else {
    ({error}=await sb.from('reiseziele').insert(record));
  }

  if(error){showToast('Fehler beim Speichern: '+error.message);return;}
  showToast(editingId?'✅ Aktualisiert!':'✅ Reiseziel gespeichert!');
  closeModal();
  loadDestinations();
}

async function deleteDestination(id){
  if(!confirm('Reiseziel wirklich löschen?'))return;
  const {error}=await sb.from('reiseziele').delete().eq('id',id);
  if(error){showToast('Fehler beim Löschen');return;}
  showToast('🗑 Gelöscht');
  loadDestinations();
}

// ── MODAL ──────────────────────────────────────────────
function openModal(dest=null){
  editingId=dest?dest.id:null;
  photoFile=null;
  document.getElementById('modal-title').textContent=dest?'Reiseziel bearbeiten':'Neues Reiseziel';
  document.getElementById('field-land').value=dest?dest.land:'';
  document.getElementById('field-ort').value=dest?dest.ort:'';
  document.getElementById('field-datum').value=dest&&dest.datum?dest.datum:'';
  document.getElementById('field-notizen').value=dest&&dest.notizen?dest.notizen:'';
  document.getElementById('geocode-status').textContent='';
  const preview=document.getElementById('photo-preview');
  const placeholder=document.getElementById('photo-placeholder');
  if(dest&&dest.foto_url){
    preview.src=dest.foto_url;preview.style.display='block';placeholder.style.display='none';
  } else {
    preview.src='';preview.style.display='none';placeholder.style.display='flex';
    placeholder.style.flexDirection='column';placeholder.style.alignItems='center';
  }
  document.getElementById('modal').classList.add('open');
}
function closeModal(){
  document.getElementById('modal').classList.remove('open');
}
function previewPhoto(input){
  if(!input.files||!input.files[0])return;
  photoFile=input.files[0];
  const reader=new FileReader();
  reader.onload=e=>{
    document.getElementById('photo-preview').src=e.target.result;
    document.getElementById('photo-preview').style.display='block';
    document.getElementById('photo-placeholder').style.display='none';
  };
  reader.readAsDataURL(photoFile);
}

// ── LIST RENDER ────────────────────────────────────────
function renderList(){
  const q=(document.getElementById('search-input').value||'').toLowerCase();
  const filtered=destinations.filter(d=>
    d.land.toLowerCase().includes(q)||d.ort.toLowerCase().includes(q)
  );
  const container=document.getElementById('dest-list');
  if(!filtered.length){
    container.innerHTML=`<div class="empty-state">
      <div class="icon">🗺</div>
      <p>${destinations.length?'Keine Ergebnisse für "'+q+'"':'Noch keine Reiseziele.<br>Tippe auf + um zu beginnen!'}</p>
    </div>`;
    return;
  }
  container.innerHTML=filtered.map(d=>`
    <div class="destination-card">
      ${d.foto_url?`<img class="dest-photo" src="${d.foto_url}" alt="${d.ort}" loading="lazy">`
        :`<div class="dest-photo-placeholder">🏔</div>`}
      <div class="dest-body">
        <div class="dest-location">${d.ort}</div>
        <div class="dest-country">${d.land}</div>
        ${d.datum?`<div class="dest-date">📅 ${new Date(d.datum).toLocaleDateString('de-CH',{year:'numeric',month:'long',day:'numeric'})}</div>`:''}
        ${d.notizen?`<div class="dest-notes">${d.notizen}</div>`:''}
        <div class="dest-actions">
          <button class="btn-sm btn-sm-outline" onclick='openModal(${JSON.stringify(d).replace(/'/g,"&#39;")})'>✏️ Bearbeiten</button>
          <button class="btn-sm btn-sm-danger" onclick="deleteDestination('${d.id}')">🗑 Löschen</button>
        </div>
      </div>
    </div>`).join('');
}

// ── NAVIGATION ─────────────────────────────────────────
function switchTab(tab){
  ['globe','list'].forEach(t=>{
    document.getElementById('page-'+t).classList.toggle('active',t===tab);
    document.getElementById('nav-'+t).classList.toggle('active',t===tab);
  });
  if(tab==='list')renderList();
}

// ── TOAST ──────────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove('show'),2500);
}

// ── GLOBE ──────────────────────────────────────────────
function initGlobe(){
  const container=document.getElementById('globe-container');
  const canvas=document.getElementById('globe-canvas');
  const W=container.clientWidth,H=container.clientHeight;

  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer.setSize(W,H);renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));

  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(45,W/H,0.1,1000);
  camera.position.z=2.8;

  // Starfield
  const starGeo=new THREE.BufferGeometry();
  const starCount=1500;
  const starPos=new Float32Array(starCount*3);
  for(let i=0;i<starCount*3;i++)starPos[i]=(Math.random()-0.5)*100;
  starGeo.setAttribute('position',new THREE.BufferAttribute(starPos,3));
  const starMat=new THREE.PointsMaterial({color:0xffffff,size:0.08,transparent:true,opacity:0.7});
  scene.add(new THREE.Points(starGeo,starMat));

  // Globe sphere
  const geo=new THREE.SphereGeometry(1,64,64);

  // Draw detailed Earth map on canvas
  const texCanvas=document.createElement('canvas');
  texCanvas.width=2048;texCanvas.height=1024;
  const ctx=texCanvas.getContext('2d');

  // Ocean gradient
  const oceanGrad=ctx.createLinearGradient(0,0,0,1024);
  oceanGrad.addColorStop(0,'#0a2040');
  oceanGrad.addColorStop(0.5,'#0d3060');
  oceanGrad.addColorStop(1,'#0a2040');
  ctx.fillStyle=oceanGrad;
  ctx.fillRect(0,0,2048,1024);

  // Helper: convert lat/lng to canvas x/y
  // lng: -180..180 → 0..2048, lat: 90..-90 → 0..1024
  function ll(lng,lat){return[(lng+180)/360*2048,(90-lat)/180*1024];}

  function poly(coords,fill,stroke){
    ctx.beginPath();
    coords.forEach(([lng,lat],i)=>{
      const [x,y]=ll(lng,lat);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.closePath();
    if(fill){ctx.fillStyle=fill;ctx.fill();}
    if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=.5;ctx.stroke();}
  }

  const land='#2d5a27', land2='#3a7033', coast='#4a8a42';

  // ── NORTH AMERICA ──
  poly([[-168,72],[-140,70],[-95,74],[-80,73],[-65,68],[-52,65],[-55,47],[-66,44],[-70,41],[-75,35],[-80,25],[-90,20],[-87,15],[-83,10],[-77,8],[-78,2],[-68,12],[-60,5],[-50,2],[-52,10],[-60,22],[-65,32],[-75,37],[-76,35],[-80,32],[-81,25],[-90,18],[-88,16],[-83,10],[-77,8],[-105,22],[-110,24],[-117,32],[-124,37],[-124,49],[-130,55],[-140,60],[-155,60],[-162,64],[-168,72]],land,coast);

  // ── GREENLAND ──
  poly([[-50,83],[-20,83],[-17,77],[-22,70],[-44,60],[-57,62],[-60,70],[-50,83]],land,coast);

  // ── SOUTH AMERICA ──
  poly([[-80,12],[-75,12],[-62,12],[-50,5],[-35,0],[-35,-10],[-40,-20],[-42,-23],[-45,-23],[-48,-28],[-52,-33],[-58,-38],[-62,-42],[-65,-55],[-68,-56],[-72,-50],[-75,-42],[-73,-38],[-70,-30],[-70,-20],[-78,-2],[-80,0],[-78,8],[-80,12]],land,coast);

  // ── EUROPE ──
  poly([[0,51],[2,51],[5,53],[8,55],[10,58],[15,58],[18,60],[25,65],[28,71],[30,70],[35,68],[28,65],[25,60],[30,55],[25,52],[20,54],[15,54],[10,55],[8,58],[5,58],[2,51],[0,51]],land,coast);
  // Iberian Peninsula
  poly([[-9,44],[-2,44],[3,42],[3,38],[-1,37],[-7,37],[-9,39],[-9,44]],land,coast);
  // Italy
  poly([[7,44],[12,44],[16,40],[15,38],[12,38],[8,40],[7,44]],land,coast);
  // Scandinavia
  poly([[5,58],[8,58],[10,58],[15,58],[18,60],[25,65],[28,71],[20,70],[15,68],[10,63],[5,58]],land,coast);

  // ── AFRICA ──
  poly([[-6,35],[5,37],[12,34],[20,37],[32,30],[37,22],[42,12],[45,12],[42,2],[40,-5],[40,-11],[35,-18],[32,-26],[28,-34],[18,-34],[15,-29],[12,-18],[8,-5],[2,4],[-3,4],[-8,4],[-15,10],[-17,14],[-17,20],[-15,25],[-10,30],[-6,35]],land,coast);

  // ── ASIA ──
  poly([[26,71],[40,68],[60,68],[70,72],[80,74],[100,72],[140,70],[160,68],[170,64],[170,60],[160,55],[150,50],[145,45],[135,35],[125,30],[120,22],[110,18],[105,10],[100,2],[103,-1],[110,-5],[115,-8],[120,-10],[125,-8],[130,-2],[130,10],[135,18],[140,25],[145,35],[150,42],[145,48],[135,45],[130,42],[125,38],[120,35],[115,30],[110,22],[105,15],[100,5],[95,5],[90,22],[85,28],[80,30],[75,34],[70,36],[65,40],[60,43],[55,42],[50,45],[45,42],[40,38],[35,36],[30,38],[26,42],[28,48],[30,55],[25,60],[30,68],[26,71]],land,coast);

  // ── INDIAN SUBCONTINENT ──
  poly([[68,36],[75,34],[80,28],[85,22],[80,12],[75,8],[72,20],[65,22],[62,26],[68,36]],land,coast);

  // ── SOUTHEAST ASIA ──
  poly([[100,20],[105,15],[108,12],[108,5],[105,2],[102,1],[100,5],[98,8],[100,14],[100,20]],land,coast);

  // ── JAPAN ──
  poly([[130,32],[131,33],[133,34],[136,36],[137,35],[136,34],[133,33],[130,32]],land,coast);
  poly([[140,44],[141,43],[143,42],[145,44],[143,45],[140,44]],land,coast);

  // ── AUSTRALIA ──
  poly([[114,-22],[120,-18],[130,-12],[135,-12],[138,-16],[140,-18],[145,-18],[150,-22],[153,-27],[153,-33],[148,-38],[144,-38],[140,-36],[136,-35],[130,-34],[126,-34],[120,-34],[114,-28],[114,-22]],land,coast);

  // ── NEW ZEALAND ──
  poly([[172,-34],[174,-36],[175,-38],[174,-42],[172,-44],[170,-44],[168,-46],[168,-44],[170,-42],[172,-38],[170,-36],[172,-34]],land,coast);

  // ── MADAGASCAR ──
  poly([[44,-12],[48,-14],[50,-18],[50,-24],[46,-26],[44,-24],[42,-20],[43,-16],[44,-12]],land,coast);

  // ── UK & IRELAND ──
  poly([[-5,50],[-2,51],[2,52],[0,55],[-2,57],[-4,58],[-6,56],[-8,52],[-6,51],[-5,50]],land,coast);
  poly([[-10,52],[-6,52],[-8,55],[-10,54],[-10,52]],land,coast);

  // ── Polar ice caps ──
  const iceGrad=ctx.createLinearGradient(0,0,0,120);
  iceGrad.addColorStop(0,'rgba(220,235,255,1)');
  iceGrad.addColorStop(1,'rgba(200,220,255,0)');
  ctx.fillStyle=iceGrad;
  ctx.fillRect(0,0,2048,100);
  const iceGrad2=ctx.createLinearGradient(0,924,0,1024);
  iceGrad2.addColorStop(0,'rgba(200,220,255,0)');
  iceGrad2.addColorStop(1,'rgba(220,235,255,.9)');
  ctx.fillStyle=iceGrad2;
  ctx.fillRect(0,924,2048,100);

  // ── Lat/Lng grid ──
  ctx.strokeStyle='rgba(100,180,255,0.08)';ctx.lineWidth=1;
  for(let lat=-80;lat<=80;lat+=20){
    const y=(90-lat)/180*1024;
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(2048,y);ctx.stroke();
  }
  for(let lng=-160;lng<=180;lng+=20){
    const x=(lng+180)/360*2048;
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,1024);ctx.stroke();
  }

  // Subtle ocean depth effect
  const depthGrad=ctx.createRadialGradient(1024,512,0,1024,512,800);
  depthGrad.addColorStop(0,'rgba(0,60,120,0)');
  depthGrad.addColorStop(1,'rgba(0,20,50,0.3)');
  ctx.fillStyle=depthGrad;
  ctx.fillRect(0,0,2048,1024);

  const texture=new THREE.CanvasTexture(texCanvas);
  const mat=new THREE.MeshPhongMaterial({
    map:texture,
    specular:new THREE.Color(0x224488),
    shininess:30
  });
  const sphere=new THREE.Mesh(geo,mat);
  scene.add(sphere);

  // Atmosphere glow
  const atmGeo=new THREE.SphereGeometry(1.02,64,64);
  const atmMat=new THREE.MeshPhongMaterial({
    color:0x4488ff,transparent:true,opacity:0.08,side:THREE.FrontSide
  });
  scene.add(new THREE.Mesh(atmGeo,atmMat));

  // Lights
  scene.add(new THREE.AmbientLight(0x334466,0.8));
  const sun=new THREE.DirectionalLight(0xfff4e0,1.2);
  sun.position.set(5,3,5);scene.add(sun);

  // Pins group
  const pinsGroup=new THREE.Group();
  scene.add(pinsGroup);

  // Store globe ref
  globe={scene,camera,renderer,sphere,pinsGroup,destinations:[]};

  // Controls (touch + mouse)
  let isDragging=false,prevX=0,prevY=0,rotX=0,rotY=0;
  let pinchDist=0;

  function latLngTo3D(lat,lng,r=1.02){
    const phi=(90-lat)*Math.PI/180;
    const theta=(lng+180)*Math.PI/180;
    return new THREE.Vector3(
      -r*Math.sin(phi)*Math.cos(theta),
      r*Math.cos(phi),
      r*Math.sin(phi)*Math.sin(theta)
    );
  }
  globe.latLngTo3D=latLngTo3D;

  function updateGlobePinsInner(){
    while(pinsGroup.children.length)pinsGroup.remove(pinsGroup.children[0]);
    destinations.forEach(d=>{
      if(!d.lat&&!d.lng)return;
      const pos=latLngTo3D(d.lat,d.lng,1.04);
      // Pin sphere
      const pinGeo=new THREE.SphereGeometry(0.022,12,12);
      const pinMat=new THREE.MeshPhongMaterial({color:0xe8b45a,emissive:0xc87a20,emissiveIntensity:.4});
      const pin=new THREE.Mesh(pinGeo,pinMat);
      pin.position.copy(pos);
      pin.userData={id:d.id,ort:d.ort,land:d.land};
      pinsGroup.add(pin);
      // Pulse ring
      const ringGeo=new THREE.RingGeometry(0.025,0.032,16);
      const ringMat=new THREE.MeshBasicMaterial({color:0xe8b45a,transparent:true,opacity:.5,side:THREE.DoubleSide});
      const ring=new THREE.Mesh(ringGeo,ringMat);
      ring.position.copy(pos);
      ring.lookAt(0,0,0);
      pinsGroup.add(ring);
    });
  }
  globe.updatePins=updateGlobePinsInner;
  updateGlobePinsInner();

  // Raycaster for pin clicking
  const raycaster=new THREE.Raycaster();
  const mouse=new THREE.Vector2();
  const tooltip=document.getElementById('pin-tooltip');

  canvas.addEventListener('click',e=>{
    if(isDragging)return;
    const rect=canvas.getBoundingClientRect();
    mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
    mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
    raycaster.setFromCamera(mouse,camera);
    const hits=raycaster.intersectObjects(pinsGroup.children);
    if(hits.length&&hits[0].object.userData.ort){
      const d=hits[0].object.userData;
      tooltip.style.display='block';
      tooltip.style.left=e.clientX+'px';
      tooltip.style.top=e.clientY+'px';
      document.getElementById('tt-name').textContent=d.ort;
      document.getElementById('tt-country').textContent=d.land;
      setTimeout(()=>tooltip.style.display='none',2500);
    } else {
      tooltip.style.display='none';
    }
  });

  // Drag to rotate
  canvas.addEventListener('mousedown',e=>{isDragging=false;prevX=e.clientX;prevY=e.clientY;});
  canvas.addEventListener('mousemove',e=>{
    if(!(e.buttons&1))return;
    const dx=e.clientX-prevX,dy=e.clientY-prevY;
    if(Math.abs(dx)>3||Math.abs(dy)>3)isDragging=true;
    rotY+=dx*0.005;rotX+=dy*0.005;
    rotX=Math.max(-Math.PI/2,Math.min(Math.PI/2,rotX));
    prevX=e.clientX;prevY=e.clientY;
  });

  // Touch
  canvas.addEventListener('touchstart',e=>{
    isDragging=false;
    if(e.touches.length===1){prevX=e.touches[0].clientX;prevY=e.touches[0].clientY;}
    if(e.touches.length===2){
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      pinchDist=Math.sqrt(dx*dx+dy*dy);
    }
  },{passive:true});
  canvas.addEventListener('touchmove',e=>{
    if(e.touches.length===1){
      const dx=e.touches[0].clientX-prevX,dy=e.touches[0].clientY-prevY;
      if(Math.abs(dx)>3||Math.abs(dy)>3)isDragging=true;
      rotY+=dx*0.005;rotX+=dy*0.005;
      rotX=Math.max(-Math.PI/2,Math.min(Math.PI/2,rotX));
      prevX=e.touches[0].clientX;prevY=e.touches[0].clientY;
    }
    if(e.touches.length===2){
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const delta=(dist-pinchDist)*0.01;
      camera.position.z=Math.max(1.5,Math.min(5,camera.position.z-delta));
      pinchDist=dist;
    }
  },{passive:true});

  // Scroll to zoom
  canvas.addEventListener('wheel',e=>{
    camera.position.z=Math.max(1.5,Math.min(5,camera.position.z+e.deltaY*0.003));
  },{passive:true});

  // Resize
  window.addEventListener('resize',()=>{
    const W2=container.clientWidth,H2=container.clientHeight;
    renderer.setSize(W2,H2);camera.aspect=W2/H2;camera.updateProjectionMatrix();
  });

  // Animate
  let animFrame;
  function animate(){
    animFrame=requestAnimationFrame(animate);
    sphere.rotation.y=rotY;sphere.rotation.x=rotX;
    pinsGroup.rotation.y=rotY;pinsGroup.rotation.x=rotX;
    renderer.render(scene,camera);
  }
  animate();
}

function updateGlobePins(){
  if(globe&&globe.updatePins){
    globe.destinations=destinations;
    globe.updatePins();
  }
}

// ── START ──────────────────────────────────────────────
init();
</script>
